<!--
  Josephine Tutoring — email signature

  HOW TO USE IN GMAIL:
  1. Open this file in a browser (Chrome, Safari, etc).
  2. Click anywhere on the rendered signature, press Cmd+A, then Cmd+C
     to select and copy the rendered version (not the source code).
  3. Open Gmail → Settings (gear icon) → See all settings → Signature.
  4. Create a new signature and paste (Cmd+V).
  5. Make sure "For new emails use" and "On reply/forward use" both point
     to the new signature, then click Save Changes at the bottom.

  HOW TO USE IN APPLE MAIL:
  1. Mail → Settings → Signatures → click + to create one.
  2. Open this file in Safari, select the rendered signature, copy (Cmd+C).
  3. Click into the signature box in Mail's settings and paste.
  4. Uncheck "Always match my default message font" so the formatting sticks.

  The logo image is loaded from josephinethetutor.com so it stays in sync
  if the site logo ever changes.
-->

</style>
</head>
